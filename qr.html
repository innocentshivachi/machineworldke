<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code – GM Machine World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a3a5c 0%, #0d1f33 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 25px 20px 35px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .logo {
            font-size: 26px;
            font-weight: 800;
            color: #1a3a5c;
            margin-bottom: 5px;
        }
        .sub {
            color: #e8621a;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e8621a;
            display: inline-block;
            padding-bottom: 4px;
        }
        .qr-box {
            background: #fff;
            padding: 15px;
            border-radius: 28px;
            display: inline-block;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            margin: 10px 0;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
        }
        .url-badge {
            background: #f0f4f8;
            padding: 12px 16px;
            border-radius: 60px;
            font-size: 14px;
            word-break: break-all;
            color: #1a3a5c;
            font-weight: 500;
            margin: 20px 0;
            border: 1px solid #e2edf2;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            background: #e8621a;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #e8621a;
            color: #e8621a;
        }
        .btn-outline:hover {
            background: #e8621a;
            color: white;
        }
        .btn:hover {
            background: #c55110;
            transform: scale(1.02);
        }
        .small-note {
            margin-top: 22px;
            font-size: 12px;
            color: #5b6e8c;
        }
        a {
            text-decoration: none;
        }
    </style>
    <!-- QRCode.js (stable, works everywhere) -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2@0.0.2/qrcode.min.js"></script>
</head>
<body>
<div class="card">
    <div class="logo">🔧 G&M Machine World</div>
    <div class="sub">Scan & visit our website</div>

    <div class="qr-box" id="qrcodeContainer"></div>

    <div class="url-badge">
        🌐 https://gmmachineworld.netlify.app/
    </div>

    <div class="btn-group">
        <button class="btn" id="downloadQrBtn">📥 Download QR (PNG)</button>
        <button class="btn btn-outline" id="copyUrlBtn">📋 Copy URL</button>
    </div>
    <div class="small-note">
        Use your phone’s camera or any QR scanner → opens the website directly.
    </div>
</div>

<script>
    // Your website URL
    const WEBSITE_URL = "https://gmmachineworld.netlify.app/";

    // Generate the QR code
    const container = document.getElementById("qrcodeContainer");
    container.innerHTML = ""; // clear if any

    new QRCode(container, {
        text: WEBSITE_URL,
        width: 240,
        height: 240,
        colorDark: "#1a3a5c",    // dark blue matches your brand
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });

    // Helper: get the canvas element (QRCode.js creates a canvas inside the container)
    function getCanvas() {
        return container.querySelector("canvas");
    }

    // DOWNLOAD QR CODE as PNG
    document.getElementById("downloadQrBtn").addEventListener("click", function() {
        const canvas = getCanvas();
        if (!canvas) {
            alert("⚠️ QR code canvas not found. Please refresh and try again.");
            return;
        }
        // Create a download link
        const link = document.createElement("a");
        link.download = "GMMachineWorld_QR.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    });

    // COPY URL to clipboard
    document.getElementById("copyUrlBtn").addEventListener("click", async function() {
        try {
            await navigator.clipboard.writeText(WEBSITE_URL);
            alert("✅ Website URL copied to clipboard!");
        } catch (err) {
            alert("❌ Could not copy. The URL is: " + WEBSITE_URL);
        }
    });
</script>
</body>
</html>

<h1>HELLO WORLD</h1>
